<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Thế Giới 2D - Bản Nâng Cấp Toàn Diện</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
    body { background: #111; overflow: hidden; touch-action: none; color: white; }
    
    #gameContainer { position: relative; width: 100vw; height: 100vh; background: #81ecec; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }

    /* UI - Glassmorphism */
    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 15px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
      pointer-events: auto;
    }

    /* Top Bar */
    .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; }
    .player-info { padding: 8px 15px; color: #2d3436; font-weight: bold; }
    .menu-btns { display: flex; gap: 10px; }
    .btn { padding: 8px 15px; cursor: pointer; color: #2d3436; font-weight: bold; transition: 0.2s; }
    .btn:active { transform: scale(0.9); }

    /* Chat System */
    #chat-container { position: absolute; top: 70px; left: 15px; width: 280px; height: 200px; display: flex; flex-direction: column; pointer-events: auto; z-index: 10; }
    #chat-history { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; color: #333; text-shadow: 0 0 2px rgba(255,255,255,0.8); display: flex; flex-direction: column; gap: 5px; -webkit-overflow-scrolling: touch; }
    .chat-msg { background: rgba(255,255,255,0.6); padding: 5px 10px; border-radius: 10px; width: fit-content; max-width: 100%; word-wrap: break-word; }
    .chat-msg span { font-weight: bold; color: #e17055; }
    #chat-input-area { display: flex; padding: 5px; background: rgba(255,255,255,0.3); border-radius: 0 0 15px 15px; }
    #chat-input { flex: 1; border: none; padding: 8px; border-radius: 10px; outline: none; font-size: 14px; }
    #btn-send { background: #00b894; color: white; border: none; padding: 0 15px; margin-left: 5px; border-radius: 10px; font-weight: bold; cursor: pointer; }

    /* Joystick */
    #joystick { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; border-radius: 50%; pointer-events: auto; z-index: 10; display: flex; justify-content: center; align-items: center; }
    #joystick-knob { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.9); box-shadow: 0 4px 15px rgba(0,0,0,0.3); pointer-events: none; }

    /* Wardrobe Modal */
    #wardrobe { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; padding: 20px; color: #2d3436; display: none; z-index: 100; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-weight: bold; font-size: 18px; color: #d63031; cursor: pointer; }
    .color-picker { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    input[type="color"] { border: none; width: 40px; height: 40px; border-radius: 5px; cursor: pointer; }

  </style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div class="top-bar">
    <div class="glass-panel player-info">Khu vực: Công Viên Trung Tâm</div>
    <div class="menu-btns">
      <div class="glass-panel btn" onclick="openWardrobe()">👕 Thay đồ</div>
    </div>
  </div>

  <div id="chat-container" class="glass-panel">
    <div id="chat-history"></div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
      <button id="btn-send">Gửi</button>
    </div>
  </div>

  <div id="joystick" class="glass-panel">
    <div id="joystick-knob"></div>
  </div>

  <div id="wardrobe" class="glass-panel">
    <span class="close-btn" onclick="closeWardrobe()">✖</span>
    <h3 style="text-align: center; margin-bottom: 10px;">Phòng Thay Đồ</h3>
    <div class="color-picker">Màu Áo: <input type="color" id="color-shirt" value="#0984e3"></div>
    <div class="color-picker">Màu Quần: <input type="color" id="color-pants" value="#2d3436"></div>
    <div class="color-picker">Màu Da: <input type="color" id="color-skin" value="#ffeaa7"></div>
    <button class="btn glass-panel" style="width: 100%; margin-top: 10px; background:#00b894; color:white; border:none;" onclick="closeWardrobe()">Xong</button>
  </div>
</div>

<script>
// ================= HỆ THỐNG CỐT LÕI =================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// CAMERA & THẾ GIỚI
const worldSize = 3000;
const camera = { x: 0, y: 0 };

// ================= TẠO CẢNH QUAN (MAP GENERATION) =================
const environments = [];
function initMap() {
  // Tạo cỏ
  for(let i = 0; i < 400; i++) {
    environments.push({
      type: 'grass',
      x: Math.random() * worldSize, y: Math.random() * worldSize,
      size: Math.random() * 5 + 3,
      sortY: -9999 // Cỏ luôn ở dưới cùng
    });
  }
  // Tạo cây cối
  const treeColors = ['#00b894', '#55efc4', '#00a8ff'];
  for(let i = 0; i < 150; i++) {
    const y = Math.random() * worldSize;
    environments.push({
      type: 'tree',
      x: Math.random() * worldSize, y: y,
      size: Math.random() * 30 + 40,
      color: treeColors[Math.floor(Math.random() * treeColors.length)],
      sortY: y // Tree đè lên nhân vật nếu nhân vật đứng sau (y nhỏ hơn)
    });
  }
}
initMap();

// ================= THỰC THỂ (ENTITIES) =================
class Humanoid {
  constructor(name, x, y, isPlayer = false) {
    this.name = name;
    this.x = x; this.y = y;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 250 : 100;
    
    // Tùy chỉnh ngoại hình
    this.colorSkin = '#ffeaa7';
    this.colorShirt = isPlayer ? '#0984e3' : ['#d63031', '#6c5ce7', '#e84393', '#fdcb6e'][Math.floor(Math.random()*4)];
    this.colorPants = '#2d3436';
    
    // Animation
    this.dirX = 0; this.dirY = 1; // Hướng nhìn (mặc định nhìn xuống)
    this.isMoving = false;
    this.walkCycle = 0;
    
    // Chat
    this.chatMsg = "";
    this.chatTimer = 0;
    
    // Bot AI
    if(!isPlayer) {
      this.targetX = x; this.targetY = y;
      this.waitTimer = 0;
    }
  }

  setChat(msg) {
    this.chatMsg = msg;
    this.chatTimer = 4; // Hiện 4 giây
  }

  update(dt) {
    if(this.chatTimer > 0) this.chatTimer -= dt;

    if(this.isPlayer) {
      // Logic di chuyển của người chơi (dựa vào Joystick)
      this.isMoving = (joyX !== 0 || joyY !== 0);
      if(this.isMoving) {
        this.dirX = joyX; this.dirY = joyY;
        this.x += joyX * this.speed * dt;
        this.y += joyY * this.speed * dt;
        this.walkCycle += dt * 15;
      } else {
        this.walkCycle = 0;
      }
    } else {
      // Logic của Bot (Đi loanh quanh & Chat ngẫu nhiên)
      if(this.waitTimer > 0) {
        this.waitTimer -= dt;
        this.isMoving = false;
        this.walkCycle = 0;
        
        // Random chat
        if(Math.random() < 0.005 && this.chatTimer <= 0) {
          const phrases = ["Trời hôm nay đẹp nhỉ?", "Chào đằng ấy!", "Chỗ này đông vui quá.", "Ai đi dạo với mình không?", "Lag quá ta..."];
          this.setChat(phrases[Math.floor(Math.random() * phrases.length)]);
          addChatToHistory(this.name, this.chatMsg);
        }
      } else {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.hypot(dx, dy);
        if(dist < 5) {
          this.targetX = this.x + (Math.random() - 0.5) * 400;
          this.targetY = this.y + (Math.random() - 0.5) * 400;
          this.targetX = Math.max(100, Math.min(worldSize-100, this.targetX));
          this.targetY = Math.max(100, Math.min(worldSize-100, this.targetY));
          this.waitTimer = Math.random() * 3 + 2;
        } else {
          this.isMoving = true;
          this.dirX = dx/dist; this.dirY = dy/dist;
          this.x += this.dirX * this.speed * dt;
          this.y += this.dirY * this.speed * dt;
          this.walkCycle += dt * 10;
        }
      }
    }

    // Giới hạn bản đồ
    this.x = Math.max(20, Math.min(worldSize - 20, this.x));
    this.y = Math.max(20, Math.min(worldSize - 20, this.y));
  }

  // Thuật toán vẽ nhân vật có tay chân
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    
    // Tính toán độ vung tay chân dựa trên bước đi
    const swing = this.isMoving ? Math.sin(this.walkCycle) * 10 : 0;
    
    // Tính góc xoay dựa trên hướng di chuyển
    const angle = Math.atan2(this.dirY, this.dirX) - Math.PI/2;
    
    // Vẽ Bóng
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 15, 18, 8, 0, 0, Math.PI*2); ctx.fill();

    ctx.rotate(angle);

    // --- Vẽ Chân ---
    ctx.fillStyle = this.colorPants;
    // Chân trái
    ctx.beginPath(); ctx.roundRect(-10, 5 + swing, 8, 15, 4); ctx.fill();
    // Chân phải
    ctx.beginPath(); ctx.roundRect(2, 5 - swing, 8, 15, 4); ctx.fill();

    // --- Vẽ Tay ---
    ctx.fillStyle = this.colorSkin;
    // Tay trái (vung ngược chiều chân)
    ctx.beginPath(); ctx.roundRect(-16, -5 - swing, 7, 14, 3); ctx.fill();
    // Tay phải
    ctx.beginPath(); ctx.roundRect(9, -5 + swing, 7, 14, 3); ctx.fill();

    // --- Vẽ Thân ---
    ctx.fillStyle = this.colorShirt;
    ctx.beginPath(); ctx.roundRect(-12, -10, 24, 20, 6); ctx.fill();

    // --- Vẽ Đầu ---
    ctx.fillStyle = this.colorSkin;
    ctx.beginPath(); ctx.arc(0, -10, 12, 0, Math.PI*2); ctx.fill();
    // Tóc đơn giản
    ctx.fillStyle = '#2d3436';
    ctx.beginPath(); ctx.arc(0, -14, 11, Math.PI, 0); ctx.fill();
    
    ctx.restore();

    // --- Vẽ Tên & Bong Bóng Chat (không bị xoay) ---
    ctx.textAlign = 'center';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = this.isPlayer ? '#fdcb6e' : 'white';
    ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
    ctx.fillText(this.name, this.x, this.y - 35);
    ctx.shadowBlur = 0;

    if(this.chatTimer > 0) {
      ctx.font = 'bold 13px sans-serif';
      const textW = ctx.measureText(this.chatMsg).width;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.roundRect(this.x - textW/2 - 8, this.y - 65, textW + 16, 22, 10); ctx.fill();
      
      // Mũi nhọn bong bóng chat
      ctx.beginPath(); ctx.moveTo(this.x - 5, this.y - 43); ctx.lineTo(this.x + 5, this.y - 43); ctx.lineTo(this.x, this.y - 35); ctx.fill();
      
      ctx.fillStyle = '#2d3436';
      ctx.fillText(this.chatMsg, this.x, this.y - 49);
    }
  }
}

const player = new Humanoid("Bạn (Chủ Phòng)", worldSize/2, worldSize/2, true);
const bots = [
  new Humanoid("Kiku", worldSize/2 + 100, worldSize/2 + 50),
  new Humanoid("Kenji", worldSize/2 - 150, worldSize/2 - 50),
  new Humanoid("Thảo Ngọt Ngào", worldSize/2 + 50, worldSize/2 - 200),
  new Humanoid("BoyLanhLung", worldSize/2 - 200, worldSize/2 + 150),
  new Humanoid("NPC Bán Hàng", worldSize/2, worldSize/2 - 100)
];

// ================= HỆ THỐNG CHAT TỔNG =================
const chatInput = document.getElementById('chat-input');
const chatHistory = document.getElementById('chat-history');
const btnSend = document.getElementById('btn-send');

function addChatToHistory(name, msg) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span>${name}:</span> ${msg}`;
  chatHistory.appendChild(div);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

function sendPlayerChat() {
  const msg = chatInput.value.trim();
  if(msg !== "") {
    player.setChat(msg);
    addChatToHistory(player.name, msg);
    chatInput.value = "";
  }
  // Giấu bàn phím
  chatInput.blur();
}
btnSend.addEventListener('click', sendPlayerChat);
chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendPlayerChat(); });

// Ngăn chạm vào UI kích hoạt Joystick
document.getElementById('chat-container').addEventListener('touchstart', e => e.stopPropagation());
document.getElementById('wardrobe').addEventListener('touchstart', e => e.stopPropagation());
document.querySelector('.top-bar').addEventListener('touchstart', e => e.stopPropagation());

// ================= JOYSTICK & INPUT =================
const joystick = document.getElementById('joystick');
const knob = document.getElementById('joystick-knob');
let joyX = 0, joyY = 0;

function handleJoystick(e) {
  e.preventDefault();
  const rect = joystick.getBoundingClientRect();
  const touch = Array.from(e.touches).find(t => t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) || e.touches[0];
  if(!touch) return;
  
  let dx = touch.clientX - rect.left - rect.width/2;
  let dy = touch.clientY - rect.top - rect.height/2;
  const max = 45;
  const dist = Math.hypot(dx, dy);
  if(dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
  
  joyX = dx/max; joyY = dy/max;
  knob.style.transform = `translate(${dx}px, ${dy}px)`;
}

joystick.addEventListener('touchstart', handleJoystick, {passive: false});
joystick.addEventListener('touchmove', handleJoystick, {passive: false});
joystick.addEventListener('touchend', () => { joyX = 0; joyY = 0; knob.style.transform = 'translate(0,0)'; });

// ================= WARDROBE (THAY ĐỒ) =================
function openWardrobe() { document.getElementById('wardrobe').style.display = 'block'; }
function closeWardrobe() { document.getElementById('wardrobe').style.display = 'none'; }

document.getElementById('color-shirt').addEventListener('input', (e) => player.colorShirt = e.target.value);
document.getElementById('color-pants').addEventListener('input', (e) => player.colorPants = e.target.value);
document.getElementById('color-skin').addEventListener('input', (e) => player.colorSkin = e.target.value);

// ================= VÒNG LẶP CHÍNH (GAME LOOP) =================
let lastTime = performance.now();

function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Cập nhật Thực thể
  player.update(dt);
  bots.forEach(bot => bot.update(dt));

  // Camera theo dõi người chơi (Camera mượt)
  const targetCamX = player.x - W/2;
  const targetCamY = player.y - H/2;
  camera.x += (targetCamX - camera.x) * 5 * dt;
  camera.y += (targetCamY - camera.y) * 5 * dt;
  
  // Giới hạn Camera
  camera.x = Math.max(0, Math.min(worldSize - W, camera.x));
  camera.y = Math.max(0, Math.min(worldSize - H, camera.y));

  // RENDER
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // Nền đất
  ctx.fillStyle = '#b8e994'; // Xanh lá pastel đẹp
  ctx.fillRect(0, 0, worldSize, worldSize);

  // Tập hợp TẤT CẢ mọi thứ để render theo trục Y (Tạo chiều sâu 2.5D)
  // Ai có Y thấp (ở trên) sẽ bị người có Y cao (ở dưới) đè lên
  const renderList = [];
  
  // Thêm môi trường vào danh sách
  environments.forEach(env => {
    if(env.x > camera.x - 100 && env.x < camera.x + W + 100 && env.y > camera.y - 100 && env.y < camera.y + H + 100) {
      renderList.push({ type: 'env', data: env, sortY: env.sortY });
    }
  });

  // Thêm nhân vật vào danh sách
  renderList.push({ type: 'human', data: player, sortY: player.y });
  bots.forEach(bot => renderList.push({ type: 'human', data: bot, sortY: bot.y }));

  // Sắp xếp
  renderList.sort((a, b) => a.sortY - b.sortY);

  // Vẽ theo thứ tự
  renderList.forEach(item => {
    if(item.type === 'env') {
      const e = item.data;
      if(e.type === 'grass') {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#78e08f';
        ctx.beginPath(); ctx.moveTo(e.x - e.size/2, e.y); ctx.lineTo(e.x, e.y - e.size); ctx.lineTo(e.x + e.size/2, e.y); ctx.fill();
      } else if(e.type === 'tree') {
        // Bóng cây
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath(); ctx.ellipse(e.x, e.y, e.size/1.5, e.size/3, 0, 0, Math.PI*2); ctx.fill();
        // Thân cây
        ctx.fillStyle = '#b71540';
        ctx.fillRect(e.x - e.size/10, e.y - e.size, e.size/5, e.size);
        // Tán cây (Vẽ 3 lớp xếp chồng tạo hiệu ứng 3D)
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y - e.size, e.size/1.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.15)'; // Highlight
        ctx.beginPath(); ctx.arc(e.x - 5, e.y - e.size - 10, e.size/2, 0, Math.PI*2); ctx.fill();
      }
    } else if(item.type === 'human') {
      item.data.draw(ctx);
    }
  });

  ctx.restore();
  requestAnimationFrame(loop);
}

// Bắt đầu game
addChatToHistory("Hệ Thống", "Chào mừng bạn đến với Thế Giới Nâng Cấp!");
requestAnimationFrame(loop);
</script>
</body>
</html>
